<script src="/HistoryView/static/highcharts/highstock.js"></script>
<script src="/HistoryView/static/highcharts/highcharts-more.js"></script>
<script src="/HistoryView/static/highcharts/modules/heatmap.js"></script>
<script src="/HistoryView/static/highcharts/modules/histogram-bellcurve.js"></script>
<script src="/HistoryView/static/highcharts/modules/bullet.js"></script>
<script src="/HistoryView/static/highcharts/exporting.js"></script>
<script src="/HistoryView/static/highcharts/export-data.js"></script>
<script src="/HistoryView/static/highcharts/accessibility.js"></script>

<div id="widget_history_{{ widget_config.id }}" style="height:100%; display:flex; flex-direction:column; gap:.5rem; overflow:hidden;">
  <div id="chart_{{ widget_config.id }}" style="flex:1; min-height:0; width:100%;"></div>
</div>

<script>
(function () {
  const widgetId = {{ widget_config.id|tojson }};
  const widgetConfig = {{ widget_config|tojson }};
  const payloads = {{ properties_payloads|tojson }};
  const chartContainerId = `chart_${widgetId}`;

  function colors() {
    const body = document.querySelector('[data-tag="body"]') || document.body;
    const css = getComputedStyle(body);
    return {
      primary: css.getPropertyValue('--bs-primary').trim() || '#0d6efd',
      success: css.getPropertyValue('--bs-success').trim() || '#198754',
      info: css.getPropertyValue('--bs-info').trim() || '#0dcaf0',
      warning: css.getPropertyValue('--bs-warning').trim() || '#ffc107',
      danger: css.getPropertyValue('--bs-danger').trim() || '#dc3545',
      secondary: css.getPropertyValue('--bs-secondary').trim() || '#6c757d',
      text: css.getPropertyValue('--bs-body-color').trim() || '#212529',
      bg: css.getPropertyValue('--bs-body-bg').trim() || '#fff',
      border: css.getPropertyValue('--bs-border-color').trim() || '#dee2e6'
    };
  }

  function applyTheme() {
    const c = colors();
    Highcharts.setOptions({
      time: { timezone: Intl.DateTimeFormat().resolvedOptions().timeZone },
      colors: [c.primary, c.success, c.info, c.warning, c.danger, c.secondary],
      chart: { backgroundColor: c.bg, style: { color: c.text } },
      title: { style: { color: c.text } },
      xAxis: { lineColor: c.border, tickColor: c.border, labels: { style: { color: c.text } } },
      yAxis: { gridLineColor: c.border, lineColor: c.border, tickColor: c.border, labels: { style: { color: c.text } } },
      legend: { itemStyle: { color: c.text } },
      tooltip: { backgroundColor: c.bg, borderColor: c.border, style: { color: c.text } }
    });
  }

  function chartHeight() {
    const host = document.getElementById(`widget_history_${widgetId}`);
    return Math.max(240, host ? host.getBoundingClientRect().height - 4 : 280);
  }

  function normalizeChartType(chartType) {
    const t = (chartType || '').toLowerCase().trim();
    if (!t) return 'line';
    if (t === 'heatmap' || t === 'heatmap 24x7' || t === 'heatmap24x7') return 'heatmap24';
    if (t === 'radar' || t === 'polar') return 'radar24';
    if (t === 'waterfall delta') return 'waterfall';
    if (t === 'moving average') return 'movingavg';
    return t;
  }

  function isDedicatedType(chartType) {
    const t = normalizeChartType(chartType);
    return ['pie', 'heatmap24', 'histogram', 'bullet', 'radar24'].includes(t);
  }

  function isStockSafeType(type) {
    return ['line', 'column', 'spline', 'area', 'areaspline', 'scatter', 'ohlc'].includes(type);
  }

  function resolveSeriesType(chartType) {
    const t = normalizeChartType(chartType);
    if (t === 'step' || t === 'stepmarkers') return { type: 'line', step: 'left', marker: t === 'stepmarkers' ? { enabled: true, radius: 2.5 } : undefined };
    if (t === 'steparea') return { type: 'area', step: 'left' };
    if (t === 'linearea') return { type: 'spline' };
    if (!isStockSafeType(t)) return { type: 'line', step: undefined };
    return { type: t, step: undefined };
  }

  function buildMovingAverage(data, windowSize = 10) {
    if (!Array.isArray(data) || data.length < 2) return [];
    const result = [];
    let rollingSum = 0;
    for (let i = 0; i < data.length; i += 1) {
      const point = data[i];
      const value = Array.isArray(point) ? Number(point[1]) : NaN;
      if (!Number.isFinite(value)) continue;
      rollingSum += value;
      if (i >= windowSize) {
        const old = data[i - windowSize];
        const oldValue = Array.isArray(old) ? Number(old[1]) : NaN;
        if (Number.isFinite(oldValue)) rollingSum -= oldValue;
      }
      const count = Math.min(i + 1, windowSize);
      result.push([point[0], Number((rollingSum / count).toFixed(4))]);
    }
    return result;
  }

  function buildDelta(data) {
    if (!Array.isArray(data) || data.length < 2) return [];
    const result = [];
    for (let i = 1; i < data.length; i += 1) {
      const prev = Number(data[i - 1][1]);
      const curr = Number(data[i][1]);
      if (!Number.isFinite(prev) || !Number.isFinite(curr)) continue;
      result.push([data[i][0], Number((curr - prev).toFixed(4))]);
    }
    return result;
  }

  function getAutoBucketMs(data) {
    if (!Array.isArray(data) || data.length < 2) return 3600 * 1000;
    const minTs = Number(data[0][0]);
    const maxTs = Number(data[data.length - 1][0]);
    if (!Number.isFinite(minTs) || !Number.isFinite(maxTs) || maxTs <= minTs) return 3600 * 1000;
    const span = maxTs - minTs;
    return Math.max(5 * 60 * 1000, Math.min(24 * 3600 * 1000, Math.floor(span / 60)));
  }

  function buildOhlc(data) {
    if (!Array.isArray(data) || data.length < 2) return [];
    const bucketMs = getAutoBucketMs(data);
    const map = new Map();
    data.forEach((point) => {
      const ts = Number(point[0]);
      const value = Number(point[1]);
      if (!Number.isFinite(ts) || !Number.isFinite(value)) return;
      const bucketStart = Math.floor(ts / bucketMs) * bucketMs;
      const prev = map.get(bucketStart);
      if (!prev) {
        map.set(bucketStart, { open: value, high: value, low: value, close: value });
      } else {
        prev.high = Math.max(prev.high, value);
        prev.low = Math.min(prev.low, value);
        prev.close = value;
      }
    });
    return [...map.entries()].sort((a, b) => a[0] - b[0]).map(([ts, o]) => [ts, o.open, o.high, o.low, o.close]);
  }

  function buildHeatmap(entriesBySeries) {
    const grid = Array.from({ length: 7 }, () => Array.from({ length: 24 }, () => 0));
    entriesBySeries.forEach((series) => {
      series.forEach((point) => {
        const ts = Number(point[0]);
        if (!Number.isFinite(ts)) return;
        const d = new Date(ts);
        const day = (d.getDay() + 6) % 7;
        const hour = d.getHours();
        grid[day][hour] += 1;
      });
    });
    let maxCount = 0;
    const points = [];
    for (let day = 0; day < 7; day += 1) {
      for (let hour = 0; hour < 24; hour += 1) {
        const count = grid[day][hour];
        if (count > maxCount) maxCount = count;
        points.push([hour, day, count]);
      }
    }
    return { points, maxCount };
  }

  function buildHistogram(data, bins = 12) {
    const values = (data || []).map((p) => Number(p[1])).filter((v) => Number.isFinite(v));
    if (!values.length) return { categories: [], counts: [] };
    const min = Math.min(...values);
    const max = Math.max(...values);
    if (min === max) return { categories: [String(min)], counts: [values.length] };
    const step = (max - min) / bins;
    const counts = Array.from({ length: bins }, () => 0);
    values.forEach((v) => {
      let idx = Math.floor((v - min) / step);
      if (idx >= bins) idx = bins - 1;
      if (idx < 0) idx = 0;
      counts[idx] += 1;
    });
    const categories = counts.map((_, i) => `${(min + i * step).toFixed(2)}..${(min + (i + 1) * step).toFixed(2)}`);
    return { categories, counts };
  }

  function getSeriesName(payload, fallbackName) {
    const objectLabel = (payload && (payload.object_description || payload.object_name || '') || '').trim();
    const propertyLabel = (payload && (payload.property_description || payload.property_name || fallbackName || '') || '').trim();
    if (objectLabel && propertyLabel) return `${propertyLabel} (${objectLabel})`;
    return propertyLabel || objectLabel || fallbackName;
  }

  function buildSeries() {
    const list = Object.entries(payloads);
    const first = list[0] ? list[0][1] : null;
    if (!first) return { mode: 'empty', series: [] };
    const effectiveMode = first.mode === 'boolean' ? 'numeric' : first.mode;
    const categories = [];
    const categoryIndex = {};
    const widgetType = normalizeChartType(widgetConfig.chart_type || 'line');
    const series = list.map(([name, payload]) => {
      const meta = payload.widget_meta || {};
      const requestedLocalType = normalizeChartType(meta.chart_type || widgetType || 'line');
      // Prevent unsupported dedicated chart types from leaking into stock mixed-series mode.
      const localType = (isDedicatedType(requestedLocalType) && requestedLocalType !== widgetType)
        ? normalizeChartType(widgetType || 'line')
        : requestedLocalType;
      const normalizedType = resolveSeriesType(localType);
      const seriesName = getSeriesName(payload, name);
      if (effectiveMode === 'state' && payload.series && payload.series.state) {
        (payload.series.state_categories || []).forEach((item) => {
          if (!(item in categoryIndex)) {
            categoryIndex[item] = categories.length;
            categories.push(item);
          }
        });
        return {
          name: seriesName,
          type: normalizedType.type === 'area' ? 'area' : 'line',
          step: normalizedType.step || 'left',
          marker: normalizedType.marker,
          data: (payload.series.state || []).map((point) => [point[0], categoryIndex[(payload.series.state_categories || [])[point[1]]] ?? point[1]]),
          color: meta.color || undefined,
          rawData: payload.series ? (payload.series.numeric || []) : []
        };
      }
      const rawData = payload.series ? (payload.series.numeric || []) : [];
      let data = rawData;
      let type = normalizedType.type;
      let step = normalizedType.step;
      let marker = normalizedType.marker;
      if (localType === 'movingavg') {
        data = buildMovingAverage(rawData, 10);
        type = 'spline';
      } else if (localType === 'delta' || localType === 'waterfall') {
        data = buildDelta(rawData);
        type = 'column';
        step = undefined;
        marker = undefined;
      } else if (localType === 'ohlc') {
        data = buildOhlc(rawData);
        type = 'ohlc';
        step = undefined;
        marker = undefined;
      } else if (localType === 'timeline') {
        data = rawData.map((point) => [point[0], 1]);
        type = 'scatter';
        step = undefined;
      } else if (isDedicatedType(localType) && localType !== widgetType) {
        // Extra safeguard: if config is inconsistent, downgrade to standard line.
        type = 'line';
        step = undefined;
        marker = undefined;
        data = rawData;
      }
      return {
        name: seriesName,
        type,
        step: payload.mode === 'boolean' && type === 'line' ? 'left' : step,
        marker,
        data,
        rawData,
        color: meta.color || undefined
      };
    });
    return { mode: effectiveMode, series, categories, widgetType };
  }

  function sanitizeSeriesForStock(seriesList) {
    return (seriesList || []).map((series) => {
      const safeType = isStockSafeType(series.type) ? series.type : 'line';
      const normalized = {
        name: series.name,
        type: safeType,
        data: Array.isArray(series.data) ? series.data : [],
        color: series.color
      };
      if (safeType === 'line' || safeType === 'area' || safeType === 'spline' || safeType === 'scatter') {
        normalized.step = series.step;
        if (series.marker) normalized.marker = series.marker;
      }
      return normalized;
    });
  }

  function createChart() {
    applyTheme();
    const c = colors();
    const built = buildSeries();
    if (!built.series.length) {
      document.getElementById(chartContainerId).innerHTML = '<div class="text-center text-muted p-3">{{ _("No data available") }}</div>';
      return;
    }
    const usePie = built.widgetType === 'pie';
    if (usePie) {
      const data = [];
      Object.values(payloads).forEach((payload) => {
        const seriesName = getSeriesName(payload, payload.property_name);
        (payload.series && payload.series.value_pie ? payload.series.value_pie : []).forEach((item) => {
          data.push([`${seriesName}: ${item[0]}`, item[1]]);
        });
      });
      Highcharts.chart(chartContainerId, {
        chart: { type: 'pie', height: chartHeight() },
        title: { text: widgetConfig.name },
        series: [{ name: 'Values', data }],
        legend: { enabled: widgetConfig.show_legend !== false },
        exporting: { enabled: {{ 'true' if widget_config.show_context_menu else 'false' }} },
        credits: { enabled: false }
      });
      return;
    }

    if (built.widgetType === 'heatmap24') {
      const dayLabels = ['{{ _("Mon") }}', '{{ _("Tue") }}', '{{ _("Wed") }}', '{{ _("Thu") }}', '{{ _("Fri") }}', '{{ _("Sat") }}', '{{ _("Sun") }}'];
      const heatmap = buildHeatmap(built.series.map((s) => s.rawData || []));
      Highcharts.chart(chartContainerId, {
        chart: { type: 'heatmap', height: chartHeight() },
        title: { text: widgetConfig.name },
        xAxis: { categories: Array.from({ length: 24 }, (_, i) => `${i}:00`) },
        yAxis: { categories: dayLabels, reversed: true, title: { text: null } },
        colorAxis: { min: 0, max: Math.max(1, heatmap.maxCount) },
        series: [{ name: '{{ _("Activity") }}', data: heatmap.points }],
        exporting: { enabled: {{ 'true' if widget_config.show_context_menu else 'false' }} },
        credits: { enabled: false }
      });
      return;
    }

    if (built.widgetType === 'histogram') {
      const allData = built.series.flatMap((s) => s.rawData || []);
      const hist = buildHistogram(allData, 14);
      Highcharts.chart(chartContainerId, {
        chart: { type: 'column', height: chartHeight() },
        title: { text: widgetConfig.name },
        xAxis: { categories: hist.categories },
        yAxis: { title: { text: '{{ _("Frequency") }}' }, min: 0 },
        series: [{ name: '{{ _("Distribution") }}', data: hist.counts }],
        exporting: { enabled: {{ 'true' if widget_config.show_context_menu else 'false' }} },
        credits: { enabled: false }
      });
      return;
    }

    if (built.widgetType === 'bullet') {
      const points = built.series.map((s) => {
        const values = (s.rawData || []).map((p) => Number(p[1])).filter((v) => Number.isFinite(v));
        const current = values.length ? values[values.length - 1] : 0;
        const avg = values.length ? values.reduce((a, b) => a + b, 0) / values.length : 0;
        return { y: current, target: avg };
      });
      Highcharts.chart(chartContainerId, {
        chart: { type: 'bullet', height: chartHeight() },
        title: { text: widgetConfig.name },
        xAxis: { categories: built.series.map((s) => s.name) },
        yAxis: { title: { text: null } },
        series: [{ name: '{{ _("Current") }}', data: points }],
        exporting: { enabled: {{ 'true' if widget_config.show_context_menu else 'false' }} },
        credits: { enabled: false }
      });
      return;
    }

    if (built.widgetType === 'radar24') {
      const profileSeries = built.series.map((s) => {
        const sums = Array.from({ length: 24 }, () => 0);
        const counts = Array.from({ length: 24 }, () => 0);
        (s.rawData || []).forEach((p) => {
          const ts = Number(p[0]);
          const val = Number(p[1]);
          if (!Number.isFinite(ts) || !Number.isFinite(val)) return;
          const hour = new Date(ts).getHours();
          sums[hour] += val;
          counts[hour] += 1;
        });
        return {
          name: s.name,
          type: 'line',
          data: Array.from({ length: 24 }, (_, h) => counts[h] ? Number((sums[h] / counts[h]).toFixed(4)) : null),
          color: s.color
        };
      });
      Highcharts.chart(chartContainerId, {
        chart: { polar: true, type: 'line', height: chartHeight() },
        title: { text: widgetConfig.name },
        pane: { size: '82%' },
        xAxis: { categories: Array.from({ length: 24 }, (_, i) => `${i}:00`), tickmarkPlacement: 'on', lineWidth: 0 },
        yAxis: { title: { text: null } },
        series: profileSeries,
        legend: { enabled: widgetConfig.show_legend !== false },
        exporting: { enabled: {{ 'true' if widget_config.show_context_menu else 'false' }} },
        credits: { enabled: false }
      });
      return;
    }

    const options = {
      chart: { renderTo: chartContainerId, height: chartHeight() },
      title: { text: widgetConfig.name },
      xAxis: { type: 'datetime' },
      yAxis: built.mode === 'state'
        ? { title: { text: null }, categories: built.categories }
        : { title: { text: null } },
      legend: { enabled: widgetConfig.show_legend !== false },
      navigator: {
        enabled: widgetConfig.show_navigator !== false,
        series: { color: c.primary, lineColor: c.primary }
      },
      rangeSelector: { enabled: widgetConfig.show_range_selector !== false, inputEnabled: false },
      series: sanitizeSeriesForStock(built.series),
      exporting: { enabled: {{ 'true' if widget_config.show_context_menu else 'false' }} },
      credits: { enabled: false }
    };
    try {
      Highcharts.stockChart(options);
    } catch (error) {
      console.error('HistoryView widget stockChart failed, fallback to basic chart', error, options);
      const fallbackOptions = {
        chart: { renderTo: chartContainerId, height: chartHeight(), type: 'line' },
        title: { text: widgetConfig.name },
        xAxis: { type: 'datetime' },
        yAxis: built.mode === 'state'
          ? { title: { text: null }, categories: built.categories }
          : { title: { text: null } },
        legend: { enabled: widgetConfig.show_legend !== false },
        series: sanitizeSeriesForStock(built.series).map((s) => ({ ...s, type: (s.type === 'ohlc' ? 'line' : s.type) })),
        exporting: { enabled: {{ 'true' if widget_config.show_context_menu else 'false' }} },
        credits: { enabled: false }
      };
      Highcharts.chart(fallbackOptions);
    }
  }

  function resizeChart() {
    const chart = Highcharts.charts.find((item) => item && item.renderTo && item.renderTo.id === chartContainerId);
    if (chart) {
      chart.setSize(null, chartHeight(), false);
    }
  }

  createChart();
  window.addEventListener('resize', resizeChart);
})();
</script>
